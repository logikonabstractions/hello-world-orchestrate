services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hello-world-frontend
    ports:
      - "4173:4173"
    depends_on:
      - sqlite
    restart: unless-stopped

  sqlite:
    build:
      context: .
      dockerfile: Dockerfile.sqlite
    container_name: hello-world-sqlite
    volumes:
      - hello_world_sqlite_data:/data
    restart: unless-stopped

volumes:
  hello_world_sqlite_data:
    name: hello_world_sqlite_data
